# ==========================================
# 部署配置文件
# ==========================================
# 说明：
# 1. 端口优先级：配置文件 > 镜像标签
# 2. 如果配置文件中没有设置，则使用镜像标签中的端口
# 3. 可以为不同环境设置不同的端口映射
# ==========================================

# ------------------------------------------
# User 服务部署配置
# ------------------------------------------
[user-api]
# 外部访问端口（覆盖镜像标签）
external_port=8888
# 容器副本数
replicas=2
# 健康检查路径
health_check=/health

[user-rpc]
external_port=8090
replicas=3

# ------------------------------------------
# IM 服务部署配置
# ------------------------------------------
[im-api]
external_port=8899
replicas=2

[im-rpc]
external_port=8091
replicas=2

[im-ws]
external_port=8092
replicas=2

# ------------------------------------------
# Social 服务部署配置
# ------------------------------------------
[social-api]
external_port=8889
replicas=2

[social-rpc]
external_port=8093
replicas=2

# ------------------------------------------
# Task 服务部署配置
# ------------------------------------------
[task-mq]
external_port=8094
replicas=1

# ------------------------------------------
# 端口映射策略配置
# ------------------------------------------
[port_strategy]
# 红绿部署端口偏移量
green_blue_offset=1
# 是否自动计算外部端口（如果为 false，则必须配置 external_port）
auto_calculate=true
# 外部端口起始范围
external_port_start=8080
# 外部端口结束范围
external_port_end=9090
