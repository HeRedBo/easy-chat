Name: social
Host: 0.0.0.0
Port: 8889

UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc

SocialRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: social.rpc

ImRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: im.rpc


Redisx:
  Host: 127.0.0.1:6379
  Type: node
  Pass: "123456"

RpcRetry:
  user.User:
    MaxAttempts: 3
    InitialBackoff: "100ms"
    MaxBackoff: "1s"
    BackoffMultiplier: 2.0
    RetryableStatusCodes:
      - UNAVAILABLE
  social.social:
    MaxAttempts: 3
    InitialBackoff: "100ms"
    MaxBackoff: "1s"
    BackoffMultiplier: 2.0
    RetryableStatusCodes:
      - UNAVAILABLE
      - DEADLINE_EXCEEDED
  im.Im:
    MaxAttempts: 3
    InitialBackoff: "100ms"
    MaxBackoff: "1s"
    BackoffMultiplier: 2.0
    RetryableStatusCodes:
      - UNAVAILABLE

JwtAuth:
  AccessSecret: redbo.com
  AccessExpire: 8640000