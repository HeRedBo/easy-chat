Name: task.mq
ListenOn: 0.0.0.0:8094

SocialRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: social.rpc

RpcRetry:
  social.social:
    MaxAttempts: 3
    InitialBackoff: "100ms"
    MaxBackoff: "1s"
    BackoffMultiplier: 2.0
    RetryableStatusCodes:
      - UNAVAILABLE

Mysql:
  DataSource: root:root@tcp(127.0.0.1:3306)/easy-chat?charset=utf8mb4&parseTime=true&loc=Local
  MaxOpenConns: 10 # 最大打开连接数
  MaxIdleConns: 5  # 最大空闲连接数
  ConnMaxLifetime: 300s # 连接最大存活时间

MsgChatTransfer:
  Name: MsgChatTransfer
  Brokers:
    - 127.0.0.1:9092
  Group: kafka
  Topic: msgChatTransfer
  Offset: first # "first" | "last"
  Consumers: 4  # 从 1 调整为 4，提升并发处理能力（需确保 Kafka topic partitions >= 4）

MsgReadTransfer:
  Name: MsgReadTransfer
  Brokers:
    - 127.0.0.1:9092
  Group: kafka
  Topic: msgReadTransfer
  Offset: first
  Consumers: 4  # 从 1 调整为 4，提升并发处理能力

MsgReadHandler:
  GroupMsgReadHandler: 1
  GroupMsgReadRecordDelayTime: 2
  GroupMsgReadRecordDelayCount: 2

Mongo:
  Url: "mongodb://admin:admin123@127.0.0.1:27017/"
  Db: easy-chat

Redisx:
  Host: 127.0.0.1:6379
  Type: node
  Pass: "123456"

Cache:
  - Host: 127.0.0.1:6379
    Type: node
    Pass: "123456"
    
Ws:
  Host: 127.0.0.1:8093