Name: im
Host: 0.0.0.0
Port: 8899

ImRpc:
  etcd:
    hosts:
      - 127.0.0.1:2379
    key: im.rpc

SocialRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: social.rpc

UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc

RpcRetry:
  im.Im:
    MaxAttempts: 3
    InitialBackoff: "100ms"
    MaxBackoff: "1s"
    BackoffMultiplier: 2.0
    RetryableStatusCodes:
      - UNAVAILABLE
  social.social:
    MaxAttempts: 3
    InitialBackoff: "100ms"
    MaxBackoff: "1s"
    BackoffMultiplier: 2.0
    RetryableStatusCodes:
      - UNAVAILABLE
  user.User:
    MaxAttempts: 3
    InitialBackoff: "100ms"
    MaxBackoff: "1s"
    BackoffMultiplier: 2.0
    RetryableStatusCodes:
      - UNAVAILABLE

JwtAuth:
  AccessSecret: redbo.com
  AccessExpire: 8640000